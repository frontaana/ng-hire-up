<div class="list-page-container">
  <!-- Компонент фильтрации -->
  <lib-question-filter></lib-question-filter>

  @if (store.isLoading()) {
  <div class="loader-container">
    <mat-spinner diameter="50"></mat-spinner>
  </div>
  } @else {
  <div class="questions-list">
    <!-- Берем массив из реактивного computed-сигнала стора -->
    @for (question of store.filteredQuestions(); track question.id) {
    <lib-question-card [question]="question"></lib-question-card>
    } @empty {
    <div class="empty-state">Вопросы не найдены</div>
    }
  </div>
  }
</div>
